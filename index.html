<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Experience | MEPROTECH</title>
    
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>

    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
    </script>

    <style>
        :root { --accent: #ffffff; --bg: #0a0a0a; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; }
        
        #container { width: 100vw; height: 100vh; }

        /* Subtle Landing Screen */
        #overlay {
            position: absolute; inset: 0; z-index: 20;
            background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #status { 
            font-size: 10px; letter-spacing: 0.2em; color: rgba(255,255,255,0.4); 
            text-transform: uppercase; margin-bottom: 20px;
        }

        /* Minimal Progress Bar */
        #progress-container { width: 120px; height: 1px; background: rgba(255,255,255,0.1); overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

        button {
            background: none; border: 1px solid rgba(255,255,255,0.3); color: white;
            padding: 12px 40px; font-size: 11px; letter-spacing: 0.15em;
            cursor: pointer; display: none; text-transform: uppercase;
            transition: all 0.3s;
        }
        button:hover { background: white; color: black; border-color: white; }

        /* Subtle Viewfinder */
        #ui-helper {
            position: absolute; inset: 0; z-index: 10;
            display: none; pointer-events: none; opacity: 0;
            transition: opacity 0.5s;
        }

        .viewfinder {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 240px; height: 240px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        /* Scanning Line */
        .viewfinder::after {
            content: ''; position: absolute; width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            top: 0; animation: scan 3s infinite ease-in-out;
        }

        @keyframes scan { 0%, 100% { top: 0%; } 50% { top: 100%; } }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="status">Loading Engine</div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <button id="startButton">Begin Experience</button>
    </div>

    <div id="ui-helper">
        <div class="viewfinder"></div>
    </div>

    <div id="container"></div>

<script type="module" src="./ar-logic.prod.js"></script>
</body>
</html>
