<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>MEPROTECH AR</title>

<script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }
}
</script>

<style>
</style>
</head>

<body>

<div id="container"></div>
<div id="status">Loading...</div>
<button id="startBtn" style="display:none;">Start AR</button>

<script type="module">
import * as THREE from 'three';
import { MindARThree } from 'mindar-image-three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const status = document.getElementById("status");
const startBtn = document.getElementById("startBtn");

const mindarThree = new MindARThree({
  container: document.querySelector("#container"),
  imageTargetSrc: './assets/targets.mind',
});

const { renderer, scene, camera } = mindarThree;

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

// Light
const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
scene.add(light);

// Anchor
const anchor = mindarThree.addAnchor(0);

// Load Model
const loader = new GLTFLoader();

loader.load(
  './assets/model.glb',
  (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.5, 0.5, 0.5); // adjust if needed
    anchor.group.add(model);

    status.innerText = "Ready";
    startBtn.style.display = "block";
  },
  (xhr) => {
    if (xhr.total) {
      const percent = Math.round((xhr.loaded / xhr.total) * 100);
      status.innerText = `Loading ${percent}%`;
    }
  },
  () => {
    status.innerText = "Failed to load assets";
  }
);

// Start AR on user interaction
startBtn.addEventListener("click", async () => {
  startBtn.style.display = "none";
  status.innerText = "Starting AR...";

  await mindarThree.start();

  status.innerText = "Scan target image";

  anchor.onTargetFound = () => {
    status.innerText = "Target Found";
  };

  anchor.onTargetLost = () => {
    status.innerText = "Scan target image";
  };

  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });
});
</script>

</body>
</html>
