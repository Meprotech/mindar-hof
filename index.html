<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEPROTECH AR</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #container { width: 100vw; height: 100vh; }
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            align-items: center; justify-content: center; z-index: 10;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">Loading AR Experience...</div>
    <div id="container"></div>

    <script type="module">
        // Import everything as Modules to prevent "Import outside module" errors
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        
        // We use the ESM version of MindAR for compatibility with 'import'
        import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js';

        const setup = async () => {
            const container = document.querySelector("#container");
            const loadingOverlay = document.querySelector("#loading-overlay");

            try {
                const mindarThree = new MindARThree({
                    container: container,
                    imageTargetSrc: './assets/targets.mind', // CHECK CASE SENSITIVITY IN VERCEL
                });

                const {renderer, scene, camera} = mindarThree;

                // Light
                const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
                scene.add(light);

                const anchor = mindarThree.addAnchor(0);

                // Load Model
                const loader = new GLTFLoader();
                loader.load('./assets/model.glb', (gltf) => {
                    anchor.group.add(gltf.scene);
                    loadingOverlay.style.display = 'none'; // Hide loading when model is ready
                });

                await mindarThree.start();

                renderer.setAnimationLoop(() => {
                    renderer.render(scene, camera);
                });
            } catch (e) {
                console.error("AR Start Failed:", e);
                loadingOverlay.innerText = "Error: " + e.message;
            }
        }

        setup();
    </script>
</body>
</html>
