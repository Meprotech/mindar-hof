<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEPROTECH AR</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #container { width: 100vw; height: 100vh; }
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            align-items: center; justify-content: center; z-index: 10;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">Loading AR Experience...</div>
    <div id="container"></div>

<script type="module">
    // 1. You MUST use full URLs. No "bare" names like 'three'.
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js';

 const setup = async () => {
    console.log("MEPROTECH: Setup started...");
    const container = document.querySelector("#container");
    const loadingOverlay = document.querySelector("#loading-overlay");

    try {
        const mindarThree = new MindARThree({
            container: container,
            imageTargetSrc: './assets/targets.mind', 
        });

        const {renderer, scene, camera} = mindarThree;
        const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
        scene.add(light);

        const anchor = mindarThree.addAnchor(0);

        const loader = new GLTFLoader();
        console.log("MEPROTECH: Attempting to load GLB...");

        loader.load('./assets/model.glb', 
            (gltf) => {
                console.log("MEPROTECH: GLB Loaded Successfully");
                anchor.group.add(gltf.scene);
                loadingOverlay.style.display = 'none';
            },
            (xhr) => {
                const percent = (xhr.loaded / xhr.total * 100);
                console.log(`MEPROTECH: Model ${percent}% loaded`);
                loadingOverlay.innerText = `Loading Model: ${Math.round(percent)}%`;
            },
            (err) => {
                console.error("MEPROTECH: GLB Load Error", err);
                loadingOverlay.innerText = "Model Load Failed (Check Path)";
            }
        );

        console.log("MEPROTECH: Starting Camera...");
        await mindarThree.start();
        console.log("MEPROTECH: MindAR Started.");

        renderer.setAnimationLoop(() => {
            renderer.render(scene, camera);
        });
    } catch (e) {
        console.error("MEPROTECH: Critical AR Error", e);
        loadingOverlay.innerText = "Critical Error: " + e.message;
    }
}
    setup();
</script>

</body>
</html>
