<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEPROTECH AR</title>
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
    </script>
    <style>
        body, html { margin: 0; overflow: hidden; background: #000; width: 100%; height: 100%; }
        #container { width: 100vw; height: 100vh; }
        #tap-hint {
            position: absolute; top: 50%; width: 100%; text-align: center;
            color: white; font-family: sans-serif; font-size: 14px; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="tap-hint">TAP SCREEN TO SCAN</div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. Point these to your ACTUAL file names
        const mindarThree = new MindARThree({
            container: document.querySelector("#container"),
            imageTargetSrc: './targets.mind', 
        });

        const {renderer, scene, camera} = mindarThree;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const anchor = mindarThree.addAnchor(0);
        const loader = new GLTFLoader();

        // 2. Point this to your ACTUAL model name
        loader.load('./model.glb', (gltf) => {
            anchor.group.add(gltf.scene);
        });

        scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

        const start = async () => {
            document.getElementById('tap-hint').style.display = 'none';
            await mindarThree.start();
            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        }

        window.addEventListener('click', start, { once: true });
        window.addEventListener('touchstart', start, { once: true });
    </script>
</body>
</html>
