<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEPROTECH | Premium XR</title>
    
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
    </script>

    <style>
        :root { --accent: #00ff00; --glass: rgba(255, 255, 255, 0.05); --blur: blur(10px); }
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; color: white; }
        
        /* 1. Subtle Background Loading */
        #overlay {
            position: absolute; inset: 0; z-index: 50; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 1s ease;
        }

        #status-text { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 20px; }
        
        /* Minimalist Progress */
        #progress-wrap { width: 150px; height: 1px; background: rgba(255,255,255,0.1); position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.4s; box-shadow: 0 0 10px var(--accent); }

        #startButton {
            background: none; border: 1px solid white; color: white; padding: 15px 50px;
            font-size: 11px; letter-spacing: 2px; cursor: pointer; display: none;
            transition: 0.3s;
        }
        #startButton:hover { background: white; color: black; }

        /* 2. Professional HUD (Heads Up Display) */
        #hud { position: absolute; inset: 0; z-index: 10; pointer-events: none; opacity: 0; transition: 0.5s; }
        
        /* Header Branding */
        .header { position: absolute; top: 30px; width: 100%; text-align: center; font-size: 12px; letter-spacing: 4px; opacity: 0.6; }

        /* Viewfinder with scanning hint */
        .viewfinder {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; height: 260px; border: 1px solid rgba(255,255,255,0.1);
        }
        .scan-line {
            position: absolute; width: 100%; height: 1px; background: var(--accent);
            top: 0; animation: scan 3s infinite ease-in-out; opacity: 0.5;
        }

        /* 3. Bottom Control Bar (Glassmorphism) */
        .control-bar {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 400px; padding: 20px;
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            display: flex; justify-content: space-around; align-items: center; pointer-events: auto;
        }

        .btn-icon { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-icon svg { width: 20px; fill: white; }

        @keyframes scan { 0%, 100% { top: 0; } 50% { top: 100%; } }
        #container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="status-text">Meprotech Systems</div>
        <div id="progress-wrap"><div id="progress-bar"></div></div>
        <button id="startButton">START EXPERIENCE</button>
    </div>

    <div id="hud">
        <div class="header">VISUALIZING ASSET</div>
        <div class="viewfinder"><div class="scan-line"></div></div>
        
        <div class="control-bar">
            <div class="btn-icon" id="captureBtn" onclick="takePhoto()">
                <svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 1 0 5 5 5 5 0 0 0-5-5m0 2a3 3 0 1 1-3 3 3 3 0 0 1 3-3Z"/></svg>
            </div>
            <div class="btn-icon" onclick="alert('MEPROTECH XR v1.0')">
                <svg viewBox="0 0 24 24"><path d="M11 9h2V7h-2v2m0 8h2v-6h-2v6m1-15A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2Z"/></svg>
            </div>
        </div>
    </div>

    <div id="container"></div>

    <script type="module" src="./ar-logic.prod.js"></script>

    <script>
        // Global helper for the Photo Feature
        function takePhoto() {
            const canvas = document.querySelector('canvas');
            const dataURL = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = 'MEPROTECH-AR-Capture.png';
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
