<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MEPROTECH AR</title>
    
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
    </script>

    <style>
        :root { --accent: #007AFF; }
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* Loading Overlay */
        #overlay {
            position: fixed; inset: 0; background: #000; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.5s ease;
        }
        /* Update these specific parts in your <style> tag */
        #container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        /* This is the secret sauce: MindAR creates a video tag inside the container */
        #container video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important; /* Prevents stretching */
        }

        /* Ensure the canvas (3D model) also fills the screen */
        #container canvas {
            width: 100vw !important;
            height: 100vh !important;
        }

        /* Minimalist Spinner */
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Start Button */
        #startButton {
            background: var(--accent); color: white; border: none;
            padding: 14px 32px; border-radius: 30px; font-weight: 600;
            font-size: 16px; letter-spacing: 0.5px; cursor: pointer;
            display: none; transition: transform 0.2s active;
        }
        #startButton:active { transform: scale(0.95); }

        /* Scanning UI (Hidden by default) */
        #scanning-ui {
            position: fixed; inset: 0; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }
        .scanner-frame {
            width: 70vw; height: 70vw; max-width: 300px; max-height: 300px;
            border: 2px solid rgba(255,255,255,0.5); border-radius: 20px;
            position: relative; box-shadow: 0 0 0 2000px rgba(0,0,0,0.4);
        }
        .scanner-line {
            position: absolute; width: 100%; height: 2px;
            background: var(--accent); top: 0; animation: scan 2s linear infinite;
        }
        @keyframes scan { 
            0% { top: 0%; opacity: 0; }
            50% { top: 50%; opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        #status-toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff; padding: 8px 16px;
            border-radius: 20px; font-size: 12px; z-index: 110;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="spinner" id="loader-icon"></div>
        <button id="startButton">ENTER AR</button>
    </div>

    <div id="scanning-ui">
        <div class="scanner-frame">
            <div class="scanner-line"></div>
        </div>
        <p style="color: white; margin-top: 20px; font-weight: 500;">Point camera at the target</p>
    </div>

    <div id="status-toast">Initializing...</div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const statusToast = document.querySelector("#status-toast");
        const startButton = document.querySelector("#startButton");
        const overlay = document.querySelector("#overlay");
        const loaderIcon = document.querySelector("#loader-icon");
        const scanningUi = document.querySelector("#scanning-ui");

        const setup = async () => {
            const mindarThree = new MindARThree({
                container: document.querySelector("#container"),
                imageTargetSrc: './assets/targets.mind',
            });

            const {renderer, scene, camera} = mindarThree;
            
            // Optimization: Set pixel ratio for sharper models on mobile
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            const anchor = mindarThree.addAnchor(0);
            const loader = new GLTFLoader();

            // Load Model
            loader.load('./assets/model.glb', (gltf) => {
                anchor.group.add(gltf.scene);
                statusToast.innerText = "Assets Loaded Successfully";
                loaderIcon.style.display = "none";
                startButton.style.display = "block";
            }, (xhr) => {
                if (xhr.total > 0) {
                    const percent = Math.round((xhr.loaded / xhr.total) * 100);
                    statusToast.innerText = `Loading Assets: ${percent}%`;
                }
            }, (err) => {
                statusToast.innerText = "Error: Check File Paths";
            });

            startButton.addEventListener('click', async () => {
                overlay.style.opacity = "0";
                setTimeout(() => overlay.style.display = "none", 500);
                
                statusToast.innerText = "Starting Camera...";
                await mindarThree.start();
                
                scanningUi.style.display = "flex";
                statusToast.innerText = "System Active";

                // Stop scanning UI once target is found
                anchor.onTargetFound = () => { scanningUi.style.display = "none"; };
                anchor.onTargetLost = () => { scanningUi.style.display = "flex"; };

                renderer.setAnimationLoop(() => {
                    renderer.render(scene, camera);
                });
            });
        }

        setup();
    </script>
</body>
</html>
