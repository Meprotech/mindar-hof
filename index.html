<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEPROTECH AR</title>
    
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
    </script>
</head>
<body>

    <div id="overlay">
        <div id="loader-text" style="margin-bottom: 20px;">Initializing...</div>
        <button id="startButton">START AR</button>
    </div>

    <div id="ui-layer">
        <div class="scanner-box"><div class="line"></div></div>
        <p style="color: white; margin-top: 20px;">Point at Target</p>
    </div>

    <div id="status"></div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const container = document.querySelector("#container");
        const startButton = document.querySelector("#startButton");
        const overlay = document.querySelector("#overlay");
        const uiLayer = document.querySelector("#ui-layer");
        const status = document.querySelector("#status");

        const mindarThree = new MindARThree({
            container: container,
            imageTargetSrc: './assets/targets.mind',
            uiLoading: "no", // Disable built-in loading UI to use our own
            uiError: "no",
            uiScanning: "no"
        });

        const {renderer, scene, camera} = mindarThree;
        scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

        const anchor = mindarThree.addAnchor(0);
        const loader = new GLTFLoader();

        loader.load('./assets/model.glb', (gltf) => {
            anchor.group.add(gltf.scene);
            document.querySelector("#loader-text").style.display = "none";
            startButton.style.display = "block";
        });

        startButton.addEventListener('click', async () => {
            overlay.style.display = "none";
            uiLayer.style.display = "flex";
            
            await mindarThree.start();
            
            // Force renderer to fill screen on start
            renderer.setSize(window.innerWidth, window.innerHeight);

            anchor.onTargetFound = () => { uiLayer.style.display = "none"; status.innerText = "Target Found"; };
            anchor.onTargetLost = () => { uiLayer.style.display = "flex"; status.innerText = "Target Lost"; };

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        });

        // Handle Orientation changes / Resize
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
