<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEPROTECH AR | Fixed</title>
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
    </script>
    <style>
        body, html { margin: 0; overflow: hidden; background: #000; width: 100%; height: 100%; }
        #container { width: 100vw; height: 100vh; }
        #tap-hint {
            position: absolute; top: 50%; width: 100%; text-align: center;
            color: white; font-family: sans-serif; font-size: 14px; z-index: 100;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="tap-hint">TAP TO START SCANNING</div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // PATHS UPDATED TO MATCH YOUR ASSETS FOLDER
        const MIND_PATH = './assets/targets.mind';
        const GLB_PATH = './assets/model.glb';

        const setup = async () => {
            const hint = document.getElementById('tap-hint');
            
            try {
                const mindarThree = new MindARThree({
                    container: document.querySelector("#container"),
                    imageTargetSrc: MIND_PATH,
                });

                const {renderer, scene, camera} = mindarThree;
                renderer.outputColorSpace = THREE.SRGBColorSpace; 

                const anchor = mindarThree.addAnchor(0);
                const loader = new GLTFLoader();

                // Load the model from the assets folder
                loader.load(GLB_PATH, (gltf) => {
                    anchor.group.add(gltf.scene);
                    console.log("MEPROTECH: Assets loaded successfully.");
                }, null, (err) => {
                    hint.innerHTML = "ERROR: Cannot find model in assets folder.";
                });

                scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

                const start = async () => {
                    hint.innerHTML = "OPENING CAMERA...";
                    try {
                        await mindarThree.start();
                        hint.style.display = 'none';
                        renderer.setAnimationLoop(() => {
                            renderer.render(scene, camera);
                        });
                    } catch (e) {
                        hint.innerHTML = "CAMERA ERROR: Check Safari Permissions";
                    }
                }

                window.addEventListener('click', start, { once: true });
                window.addEventListener('touchstart', start, { once: true });

            } catch (e) {
                hint.innerHTML = "TRACKING ERROR: " + MIND_PATH + " missing.";
            }
        }

        setup();
    </script>
</body>
</html>
