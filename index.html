<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEPROTECH WebAR</title>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container"></div>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

<script type="module">
    // We still use type="module" to use THREE.js addons like GLTFLoader
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const setup = async () => {
        // IMPORTANT: The constructor is located at window.MINDAR.IMAGE.MindARThree
        const MindARThree = window.MINDAR.IMAGE.MindARThree;
        
        const mindarThree = new MindARThree({
            container: document.querySelector("#container"),
            imageTargetSrc: './assets/targets.mind',
        });

        const {renderer, scene, camera} = mindarThree;

        // Add lighting
        const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
        scene.add(light);

        // Setup Anchor
        const anchor = mindarThree.addAnchor(0);

        // Load GLB
        const loader = new GLTFLoader();
        loader.load('./assets/model.glb', (gltf) => {
            anchor.group.add(gltf.scene);
        }, undefined, (error) => {
            console.error("GLB Load Error:", error);
        });

        // Start
        await mindarThree.start();

        renderer.setAnimationLoop(() => {
            renderer.render(scene, camera);
        });
    }

    setup().catch(err => console.error("AR Initialization failed:", err));
</script>
</body>
</html>
