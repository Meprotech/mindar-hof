<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEPROTECH AR</title>
    
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
    </script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* The container MUST be fixed and fill the viewport */
        #container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* Force MindAR's video and canvas to behave */
        #container video, #container canvas { 
            position: absolute; top: 0; left: 0; 
            width: 100% !important; height: 100% !important; 
            object-fit: cover !important; 
        }

        #overlay {
            position: fixed; inset: 0; background: #000; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }

        #startButton {
            background: #007AFF; color: white; border: none; padding: 15px 40px;
            border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer;
            display: none;
        }

        #ui-layer {
            position: fixed; inset: 0; pointer-events: none; z-index: 10;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .scanner-box {
            width: 280px; height: 280px; border: 2px solid rgba(255,255,255,0.4);
            border-radius: 20px; position: relative;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.4); /* Dim out the rest of the screen */
        }

        .line { position: absolute; width: 100%; height: 2px; background: #007AFF; animation: scan 2s infinite; }
        @keyframes scan { 0% { top: 0% } 100% { top: 100% } }

        #status { position: fixed; bottom: 40px; width: 100%; text-align: center; color: white; font-size: 12px; z-index: 11; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="loader-text" style="margin-bottom: 20px;">Initializing...</div>
        <button id="startButton">START AR</button>
    </div>

    <div id="ui-layer">
        <div class="scanner-box"><div class="line"></div></div>
        <p style="color: white; margin-top: 20px;">Point at Target</p>
    </div>

    <div id="status"></div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const container = document.querySelector("#container");
        const startButton = document.querySelector("#startButton");
        const overlay = document.querySelector("#overlay");
        const uiLayer = document.querySelector("#ui-layer");
        const status = document.querySelector("#status");

        const mindarThree = new MindARThree({
            container: container,
            imageTargetSrc: './assets/targets.mind',
            uiLoading: "no", // Disable built-in loading UI to use our own
            uiError: "no",
            uiScanning: "no"
        });

        const {renderer, scene, camera} = mindarThree;
        scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

        const anchor = mindarThree.addAnchor(0);
        const loader = new GLTFLoader();

        loader.load('./assets/model.glb', (gltf) => {
            anchor.group.add(gltf.scene);
            document.querySelector("#loader-text").style.display = "none";
            startButton.style.display = "block";
        });

        startButton.addEventListener('click', async () => {
            overlay.style.display = "none";
            uiLayer.style.display = "flex";
            
            await mindarThree.start();
            
            // Force renderer to fill screen on start
            renderer.setSize(window.innerWidth, window.innerHeight);

            anchor.onTargetFound = () => { uiLayer.style.display = "none"; status.innerText = "Target Found"; };
            anchor.onTargetLost = () => { uiLayer.style.display = "flex"; status.innerText = "Target Lost"; };

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        });

        // Handle Orientation changes / Resize
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
