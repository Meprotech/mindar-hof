<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Direct</title>
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
    </script>
    <style>
        body, html { margin: 0; overflow: hidden; background: #000; width: 100%; height: 100%; }
        #container { width: 100vw; height: 100vh; }
        /* Simple Scanner Line */
        #scanner {
            position: absolute; inset: 0; pointer-events: none;
            border: 2px solid rgba(0, 255, 0, 0.2); z-index: 10;
        }
        #scanner::after {
            content: ''; position: absolute; width: 100%; height: 2px;
            background: #00ff00; top: 0; animation: scan 3s infinite linear;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #tap-hint {
            position: absolute; top: 50%; width: 100%; text-align: center;
            color: white; font-family: sans-serif; font-size: 12px; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="tap-hint">TAP TO ACTIVATE CAMERA</div>
    <div id="scanner"></div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const mindarThree = new MindARThree({
            container: document.querySelector("#container"),
            imageTargetSrc: './assets/config.bin',
        });

        const {renderer, scene, camera} = mindarThree;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const anchor = mindarThree.addAnchor(0);
        const loader = new GLTFLoader();

        // Load Asset immediately
        loader.load('./assets/asset.bin', (gltf) => {
            anchor.group.add(gltf.scene);
        });

        scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

        const start = async () => {
            document.getElementById('tap-hint').style.display = 'none';
            await mindarThree.start();
            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        }

        // Handle iOS interaction requirement
        window.addEventListener('click', start, { once: true });
        window.addEventListener('touchstart', start, { once: true });
    </script>
</body>
</html>
