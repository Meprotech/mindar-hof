<script type="module">
    import * as THREE from 'three';
    import { MindARThree } from 'mindar-image-three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ADJUST THESE PATHS BASED ON YOUR GITHUB FOLDER STRUCTURE
    const MIND_FILE = './targets.mind'; 
    const GLB_FILE = './model.glb';

    const setup = async () => {
        const hint = document.getElementById('tap-hint');
        
        try {
            const mindarThree = new MindARThree({
                container: document.querySelector("#container"),
                imageTargetSrc: MIND_FILE,
            });

            const {renderer, scene, camera} = mindarThree;
            renderer.outputColorSpace = THREE.SRGBColorSpace; 

            const anchor = mindarThree.addAnchor(0);
            const loader = new GLTFLoader();

            // Error handling for the 3D model
            loader.load(GLB_FILE, 
                (gltf) => {
                    console.log("MEPROTECH: Model Loaded");
                    anchor.group.add(gltf.scene);
                },
                null,
                (err) => {
                    document.body.style.background = "red";
                    hint.innerHTML = "FATAL: MODEL NOT FOUND at " + GLB_FILE;
                }
            );

            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

            const start = async () => {
                hint.innerHTML = "STARTING CAMERA...";
                try {
                    await mindarThree.start();
                    hint.style.display = 'none';
                    renderer.setAnimationLoop(() => {
                        renderer.render(scene, camera);
                    });
                } catch (e) {
                    document.body.style.background = "red";
                    hint.innerHTML = "CAMERA ERROR: Check HTTPS and Permissions";
                }
            }

            window.addEventListener('click', start, { once: true });
            window.addEventListener('touchstart', start, { once: true });

        } catch (e) {
            document.body.style.background = "red";
            hint.innerHTML = "TRACKING ERROR: Check " + MIND_FILE;
            console.error(e);
        }
    }

    setup();
</script>
