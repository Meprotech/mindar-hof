<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEPROTECH | Premium XR</title>
    
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
    </script>

    <style>
        :root { --accent: #00ff00; --glass: rgba(255, 255, 255, 0.05); --blur: blur(15px); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; color: white; }
        #container { width: 100vw; height: 100vh; position: absolute; inset: 0; }
        
        /* 1. Unauthorized Screen */
        #lock-screen { position: absolute; inset: 0; z-index: 200; background: #000; display: none; align-items: center; justify-content: center; text-align: center; }

        /* 2. Professional Loading Overlay */
        #overlay {
            position: absolute; inset: 0; z-index: 100; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }
        #status-text { font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 25px; }
        #progress-wrap { width: 160px; height: 1px; background: rgba(255,255,255,0.1); position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; box-shadow: 0 0 15px var(--accent); }
        
        #startButton {
            background: none; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 16px 50px;
            font-size: 11px; letter-spacing: 3px; cursor: pointer; display: none; margin-top: 25px; transition: 0.3s;
        }
        #startButton:hover { background: white; color: black; border-color: white; }

        /* 3. HUD (Viewfinder & Controls) */
        #hud { position: absolute; inset: 0; z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.8s ease; }
        .header { position: absolute; top: 40px; width: 100%; text-align: center; font-size: 11px; letter-spacing: 5px; opacity: 0.5; }
        
        #v-finder { 
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); 
            width: 280px; height: 280px; border: 1px solid rgba(255,255,255,0.1); 
            transition: opacity 0.5s ease;
        }
        .scan-line { 
            position: absolute; width: 100%; height: 1px; 
            background: linear-gradient(90deg, transparent, var(--accent), transparent); 
            top: 0; animation: scan 3s infinite ease-in-out; 
        }
        
        .control-bar {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 200px; padding: 15px; background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; display: flex; justify-content: space-around; pointer-events: auto;
        }
        .btn-icon svg { width: 22px; fill: rgba(255,255,255,0.8); cursor: pointer; transition: 0.2s; }
        .btn-icon:active { transform: scale(0.9); }

        @keyframes scan { 0%, 100% { top: 0%; opacity: 0.2; } 50% { top: 100%; opacity: 1; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div style="letter-spacing: 2px; color: #ff3b3b; font-size: 12px;">DOMAIN UNAUTHORIZED<br><span style="color:white; opacity:0.5; font-size: 10px;">MEPROTECH SYSTEMS PROTECTION</span></div>
    </div>

    <div id="overlay">
        <div id="status-text">SYSTEM INITIALIZING</div>
        <div id="progress-wrap"><div id="progress-bar"></div></div>
        <button id="startButton">START EXPERIENCE</button>
    </div>

    <div id="hud">
        <div id="hud-header" class="header">VISUALIZING ASSET</div>
        <div id="v-finder"><div class="scan-line"></div></div>
        <div class="control-bar">
            <div class="btn-icon" onclick="takePhoto()"><svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 1 0 5 5 5 5 0 0 0-5-5m0 2a3 3 0 1 1-3 3 3 3 0 0 1 3-3Z"/></svg></div>
            <div class="btn-icon" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35Z"/></svg></div>
        </div>
    </div>

    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        (function() {
            // 1. Domain Lock logic
            const allowed = ['meprotech.app', 'vercel.app', 'localhost'];
            if (!allowed.some(d => window.location.hostname.includes(d))) {
                document.getElementById('lock-screen').style.display = 'flex';
                throw new Error("Unauthorized Usage");
            }

            const setup = async () => {
                const statusText = document.getElementById('status-text');
                const progressBar = document.getElementById('progress-bar');
                const startBtn = document.getElementById('startButton');
                const overlay = document.getElementById('overlay');
                const hud = document.getElementById('hud');
                const vFinder = document.getElementById('v-finder');
                const header = document.getElementById('hud-header');

                try {
                    const mindarThree = new MindARThree({
                        container: document.querySelector("#container"),
                        imageTargetSrc: './assets/config.bin', 
                    });

                    const {renderer, scene, camera} = mindarThree;
                    renderer.outputColorSpace = THREE.SRGBColorSpace; // Fix warning

                    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
                    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
                    sun.position.set(1, 10, 5);
                    scene.add(sun);

                    const anchor = mindarThree.addAnchor(0);
                    const loader = new GLTFLoader();

                    statusText.innerText = "LOADING ASSETS";
                    
                    // Concurrent Loading for Speed
                    const [modelGltf] = await Promise.all([
                        new Promise((resolve, reject) => {
                            loader.load('./assets/asset.bin', resolve, (xhr) => {
                                if (xhr.lengthComputable) {
                                    progressBar.style.width = (xhr.loaded / xhr.total * 100) + '%';
                                }
                            }, reject);
                        }),
                        mindarThree.start()
                    ]);

                    anchor.group.add(modelGltf.scene);
                    
                    statusText.innerText = "READY FOR XR";
                    startBtn.style.display = 'block';

                    startBtn.addEventListener('click', () => {
                        overlay.style.opacity = '0';
                        setTimeout(() => {
                            overlay.style.display = 'none';
                            hud.style.opacity = '1';
                        }, 800);

                        renderer.setAnimationLoop(() => {
                            if (anchor.group.children.length > 0) {
                                anchor.group.children[0].rotation.y += 0.005; // Soft rotate
                            }
                            renderer.render(scene, camera);
                        });
                    });

                    anchor.onTargetFound = () => {
                        vFinder.style.opacity = "0";
                        header.innerText = "ASSET LOCKED";
                    };
                    anchor.onTargetLost = () => {
                        vFinder.style.opacity = "1";
                        header.innerText = "SEARCHING FOR TARGET";
                    };

                } catch (err) {
                    statusText.innerText = "HARDWARE ERROR";
                    console.error("Critical Failure:", err);
                }
            }

            setup();

            // Photo Capture Logic
            window.takePhoto = () => {
                const canvas = document.querySelector('canvas');
                if (canvas) {
                    const link = document.createElement('a');
                    link.download = `MEPROTECH_XR_${Date.now()}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                }
            };
        })();
    </script>
</body>
</html>
