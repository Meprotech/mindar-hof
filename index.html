<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEPROTECH AR | Camera Fix</title>
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
    </script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        /* THE FIX: Force the container to be transparent so the video behind it shows */
        #container { position: absolute; inset: 0; background: transparent !important; }
        
        /* Force the MindAR Video to fill the screen and stay at the back */
        video { 
            position: absolute; top: 0; left: 0; 
            width: 100vw !important; height: 100vh !important; 
            object-fit: cover !important; z-index: -1; 
        }

        #tap-hint {
            position: absolute; top: 50%; width: 100%; text-align: center;
            color: white; font-family: sans-serif; font-size: 14px; z-index: 100;
            letter-spacing: 2px; background: rgba(0,0,0,0.5); padding: 20px 0;
        }

        #scanner-line {
            position: absolute; width: 100%; height: 2px; background: #00ff00;
            top: 0; animation: scan 3s infinite linear; z-index: 50; pointer-events: none;
            display: none;
        }
        @keyframes scan { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    </style>
</head>
<body>
    <div id="tap-hint">TAP TO ENABLE CAMERA</div>
    <div id="scanner-line"></div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const setup = async () => {
            const hint = document.getElementById('tap-hint');
            const scanner = document.getElementById('scanner-line');

            const mindarThree = new MindARThree({
                container: document.querySelector("#container"),
                imageTargetSrc: './assets/targets.mind',
            });

            const {renderer, scene, camera} = mindarThree;
            renderer.outputColorSpace = THREE.SRGBColorSpace; 

            // IMPORTANT: Make the background of the 3D scene transparent
            renderer.setClearColor(0x000000, 0);

            const anchor = mindarThree.addAnchor(0);
            const loader = new GLTFLoader();

            loader.load('./assets/model.glb', (gltf) => {
                anchor.group.add(gltf.scene);
            });

            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

            const start = async () => {
                hint.innerHTML = "STARTING...";
                try {
                    await mindarThree.start();
                    hint.style.display = 'none';
                    scanner.style.display = 'block';
                    
                    // Force play if Safari pauses it
                    const video = document.querySelector('video');
                    if (video) video.play();

                    renderer.setAnimationLoop(() => {
                        renderer.render(scene, camera);
                    });
                } catch (e) {
                    hint.innerHTML = "CAMERA BLOCKED. CHECK SETTINGS.";
                    console.error(e);
                }
            }

            window.addEventListener('click', start, { once: true });
            window.addEventListener('touchstart', start, { once: true });
        }

        setup();
    </script>
</body>
</html>
